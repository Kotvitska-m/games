let _uid = 1;
const nid = () => _uid++;
const shuffle = a => { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b; };

function splitImg(imgKey, cols, rows) {
  const out = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      out.push({ uid: nid(), imgKey, pc: c, pr: r, cols, rows });
  return out;
}

function isComplete(board, GC, imgKey) {
  const found = [];
  board.forEach((cell, i) => { if (cell && cell.imgKey === imgKey) found.push({ i, p: cell }); });
  const p0 = found[0] && found[0].p;
  if (!p0) return false;
  const {cols, rows} = p0;
  if (found.length !== cols * rows) return false;
  const minC = Math.min(...found.map(f => f.i % GC));
  const minR = Math.min(...found.map(f => Math.floor(f.i / GC)));
  for (const {i, p} of found) {
    if ((i % GC) - minC !== p.pc) return false;
    if (Math.floor(i / GC) - minR !== p.pr) return false;
  }
  const set = new Set(found.map(f => f.i));
  for (let dr = 0; dr < rows; dr++)
    for (let dc = 0; dc < cols; dc++)
      if (!set.has((minR+dr)*GC + (minC+dc))) return false;
  return true;
}

// ── State ─────────────────────────────────────────
let state = {
  screen: 'menu',
  li: 0,
  board: [],      // null | { ...piece, flipping: bool }
  deck: [],       // hidden pieces waiting
  sel: null,
  fading: new Set(),
  done: new Set(),
  won: false,
  busy: false,
};

function setState(patch) { state = {...state, ...patch}; render(); }

// ── Init ─────────────────────────────────────────
function initLevel(idx) {
  _uid = idx * 100000 + 1;
  const lv = LEVELS[idx];
  const [sc, sr] = lv.split;
  const [GC, GR] = lv.grid;
  let board, deck = [];

  if (lv.mode === 2) {
    const pieces = shuffle(splitImg(lv.imgs[0], sc, sr));
    board = Array(GC*GR).fill(null);
    pieces.forEach((p,i) => { board[i] = {...p, flipping:false}; });
  } else if (lv.mode === 3) {
    const pieces = shuffle([...splitImg(lv.imgs[0],sc,sr),...splitImg(lv.imgs[1],sc,sr)]);
    board = Array(GC*GR).fill(null);
    pieces.forEach((p,i) => { board[i] = {...p, flipping:false}; });
  } else {
    // mode 1: fill board fully, rest → hidden deck
    const all = shuffle(lv.imgs.flatMap(k => splitImg(k,sc,sr)));
    const total = GC*GR;
    board = Array(total).fill(null);
    all.slice(0, total).forEach((p,i) => { board[i] = {...p, flipping:false}; });
    deck = all.slice(total); // hidden — we only know count, not content
  }

  state = { screen:'game', li:idx, board, deck, sel:null, fading:new Set(), done:new Set(), won:false, busy:false };
  render();
}

// ── Tap ───────────────────────────────────────────
function tap(idx) {
  const {board, sel, done, deck, fading, busy} = state;
  if (busy || fading.size > 0) return;
  const lv = LEVELS[state.li];
  const cell = board[idx];
  if (!cell || cell.flipping) return; // can't select a flipping card

  if (sel === null) { setState({sel:idx}); return; }
  if (sel === idx)  { setState({sel:null}); return; }

  // Swap
  const nb = [...board];
  [nb[sel], nb[idx]] = [nb[idx], nb[sel]];

  const [GC] = lv.grid;
  const touched = new Set([nb[sel], nb[idx]].filter(Boolean).map(p => p.imgKey));
  const newDone = new Set(done);
  const justDone = [];
  for (const k of touched) {
    if (!newDone.has(k) && isComplete(nb, GC, k)) { newDone.add(k); justDone.push(k); }
  }

  if (!justDone.length) { setState({board:nb, sel:null}); return; }

  // Mark fading
  state.busy = true;
  const fadeSet = new Set();
  nb.forEach((c,i) => { if (c && justDone.includes(c.imgKey)) fadeSet.add(i); });
  state = {...state, board:nb, sel:null, fading:fadeSet, done:newDone};
  render();

  setTimeout(() => {
    // Remove faded pieces
    const b2 = nb.map((c,i) => fadeSet.has(i) ? null : c);

    if (lv.mode === 1) {
      const [GC, GR] = lv.grid;
      // Gravity: fall down per column
      const b3 = [...b2];
      for (let c = 0; c < GC; c++) {
        const col = [];
        for (let r = GR-1; r >= 0; r--) { if (b3[r*GC+c]) col.push(b3[r*GC+c]); }
        for (let r = GR-1; r >= 0; r--) { b3[r*GC+c] = col.length ? col.shift() : null; }
      }

      // Count empty slots
      const emptyIdxs = [];
      for (let i = 0; i < b3.length; i++) { if (!b3[i]) emptyIdxs.push(i); }

      // Fill from deck — place as FLIPPING cards (face-down → reveal)
      const dk = [...state.deck];
      const flippingIdxs = new Set();
      for (const ei of emptyIdxs) {
        if (dk.length) {
          const p = dk.shift();
          b3[ei] = {...p, flipping: true}; // starts face-down, will flip
          flippingIdxs.add(ei);
        }
      }

      state = {...state, board:b3, deck:dk, fading:new Set(), busy:false};
      render();

      // After fall animation, flip each card (face-down → face-up)
      if (flippingIdxs.size > 0) {
        setTimeout(() => {
          const b4 = [...state.board];
          flippingIdxs.forEach(i => {
            if (b4[i]) b4[i] = {...b4[i], flipping: false};
          });
          state = {...state, board:b4};
          render();
        }, 400); // flip after fall lands
      }

      if (lv.imgs.every(k => newDone.has(k))) setTimeout(() => setState({won:true}), 600);

    } else {
      state = {...state, board:b2, fading:new Set(), busy:false};
      render();
      if (lv.imgs.every(k => newDone.has(k))) setTimeout(() => setState({won:true}), 350);
    }
  }, 500);
}

// ── Render ────────────────────────────────────────
function tileStyle(p, cw, selected, fading) {
  const sx = cw / (320 / p.cols);
  const sy = cw / (320 / p.rows);
  return `
    width:${cw}px; height:${cw}px;
    background-image:url(${IMGS[p.imgKey]});
    background-size:${Math.round(320*sx)}px ${Math.round(320*sy)}px;
    background-position:${-p.pc*cw}px ${-p.pr*cw}px;
    background-repeat:no-repeat;
    border:${selected?'2.5px solid #FFE566':'1px solid rgba(255,255,255,0.14)'};
    border-radius:5px;
    box-shadow:${selected?'0 0 0 3px rgba(255,229,102,0.3),0 4px 14px rgba(0,0,0,0.6)':'0 2px 6px rgba(0,0,0,0.4)'};
    cursor:pointer;
    transform:${selected?'scale(1.07)':'scale(1)'};
    opacity:${fading?0:1};
    transition:${fading?'opacity 0.42s,transform 0.4s':'transform 0.12s,box-shadow 0.12s'};
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
  `;
}

// Card back face
function cardBack(cw) {
  return `
    width:${cw}px; height:${cw}px;
    background: linear-gradient(135deg, #1a4a8a 0%, #0d2d5a 50%, #1a4a8a 100%);
    border: 1.5px solid rgba(100,160,255,0.35);
    border-radius:5px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 3px rgba(100,160,255,0.2);
    box-sizing:border-box;
    display:flex; align-items:center; justify-content:center;
    font-size:${Math.round(cw*0.45)}px;
    animation: fallIn 0.38s cubic-bezier(.22,.68,0,1.25);
  `;
}

function render() {
  const {screen, li, board, deck, sel, fading, done, won} = state;
  const app = document.getElementById('app');
  if (screen === 'menu')     { renderMenu(app); return; }
  if (screen === 'complete') { renderComplete(app); return; }

  const lv = LEVELS[li];
  const [GC, GR] = lv.grid;
  const CW = Math.min(76, Math.floor(308/GC));

  let html = `<div style="min-height:100vh;background:linear-gradient(160deg,#0c1d2e 0%,#0e2b1c 55%,#0c1d2e 100%);display:flex;flex-direction:column;align-items:center;font-family:Georgia,serif;padding-bottom:48px;user-select:none;-webkit-user-select:none;">

    <div style="width:100%;max-width:360px;display:flex;align-items:center;justify-content:space-between;padding:14px 10px 6px">
      <button onclick="gotoMenu()" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);color:#7ab87a;border-radius:8px;padding:7px 13px;cursor:pointer;font-family:Georgia,serif;font-size:13px">← Меню</button>
      <div style="text-align:center">
        <div style="color:#4a8a5a;font-size:10px;letter-spacing:3px">УРОВЕНЬ</div>
        <div style="color:#FFE566;font-size:28px;font-weight:bold;line-height:1;text-shadow:0 0 14px rgba(255,229,102,0.45)">${lv.id}</div>
      </div>
      <div style="font-size:10px;color:#3a6a4a;max-width:80px;text-align:right;line-height:1.6">
        ${lv.mode===1?'🌊 Колода':lv.mode===2?'🧩 Одна картинка':'🧩🧩 Две картинки'}
      </div>
    </div>

    <div style="width:100%;max-width:360px;padding:0 10px 10px">
      <div style="height:3px;background:rgba(255,255,255,0.07);border-radius:2px">
        <div style="height:100%;width:${((li+1)/20)*100}%;background:linear-gradient(90deg,#2a8a3a,#FFE566);border-radius:2px;transition:width 0.5s"></div>
      </div>
    </div>`;

  // ── DECK (mode 1 only) — closed cards stacked ──
  if (lv.mode === 1) {
    const deckCount = deck.length;
    const visibleCards = Math.min(deckCount, 6);
    html += `<div style="margin-bottom:10px;display:flex;flex-direction:row;align-items:center;gap:6px;padding:0 10px">
      <div style="font-size:10px;color:#4a7aaa;letter-spacing:1px;white-space:nowrap">Осталось:</div>
      <div style="position:relative;height:${CW+6}px;width:${visibleCards>0?CW+visibleCards*4:CW}px;">`;

    // Stack of face-down cards (each slightly offset)
    for (let i = visibleCards-1; i >= 0; i--) {
      const offset = i * 4;
      html += `<div style="
        position:absolute;
        left:${offset}px; top:${i*1}px;
        width:${CW}px; height:${CW}px;
        background:linear-gradient(135deg,#1a4a8a 0%,#0d2d5a 50%,#1a4a8a 100%);
        border:1.5px solid rgba(100,160,255,0.4);
        border-radius:6px;
        box-shadow:0 3px 8px rgba(0,0,0,0.5),inset 0 1px 3px rgba(100,160,255,0.15);
        display:flex;align-items:center;justify-content:center;
        font-size:${Math.round(CW*0.38)}px;
      ">🂠</div>`;
    }
    html += `</div>`;

    // Count badge
    if (deckCount > 0) {
      html += `<div style="
        background:rgba(26,74,138,0.7);
        border:1px solid rgba(100,160,255,0.3);
        border-radius:12px;
        color:#7ab8ff;
        font-size:13px;
        font-weight:bold;
        padding:4px 10px;
        white-space:nowrap;
      ">${deckCount} карт</div>`;
    } else {
      html += `<div style="color:#3a6a4a;font-size:11px">колода пуста</div>`;
    }
    html += `</div>`;
  }

  // ── BOARD ──────────────────────────────────────
  html += `<div id="board" style="display:grid;grid-template-columns:repeat(${GC},${CW}px);gap:3px;background:rgba(0,0,0,0.42);padding:6px;border-radius:12px;border:1px solid rgba(255,255,255,0.07);box-shadow:inset 0 2px 10px rgba(0,0,0,0.5),0 8px 30px rgba(0,0,0,0.5)">`;

  board.forEach((cell, idx) => {
    const isSel    = sel === idx;
    const isFading = fading.has(idx);

    if (!cell) {
      // empty slot
      html += `<div style="width:${CW}px;height:${CW}px;border-radius:5px;background:rgba(255,255,255,0.025);border:1px dashed rgba(255,255,255,0.07)"></div>`;
    } else if (cell.flipping) {
      // face-down card just fell — show back with flip animation
      html += `<div style="${cardBack(CW)} animation:fallIn 0.38s cubic-bezier(.22,.68,0,1.25),flipCard 0.5s 0.35s forwards;">🂠</div>`;
    } else {
      // normal face-up piece
      html += `<div onclick="tap(${idx})" style="width:${CW}px;height:${CW}px;border-radius:5px;overflow:hidden;cursor:pointer">
        <div style="${tileStyle(cell, CW, isSel, isFading)}"></div>
      </div>`;
    }
  });
  html += `</div>`;

  // ── TARGET THUMBNAILS ──────────────────────────
  html += `<div style="display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;justify-content:center;max-width:360px;padding:0 10px">`;
  lv.imgs.forEach(k => {
    const isDone = done.has(k);
    html += `<div style="width:38px;height:38px;background-image:url(${IMGS[k]});background-size:cover;border-radius:7px;border:${isDone?'2px solid #3a9a4a':'2px solid rgba(255,255,255,0.13)'};opacity:${isDone?0.45:1};filter:${isDone?'grayscale(80%)':'none'};transition:all 0.5s;position:relative;overflow:hidden">
      ${isDone?'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,90,10,0.55);font-size:16px">✓</div>':''}
    </div>`;
  });
  html += `</div>`;

  html += `<div style="color:#2a5a3a;font-size:10px;margin-top:8px;text-align:center">Нажми кусочек → нажми другой → поменяются местами</div>`;

  // ── WIN OVERLAY ────────────────────────────────
  if (won) {
    html += `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.83);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999">
      <div style="background:linear-gradient(135deg,#091e12,#0e3020);border:2px solid #3a9a4a;border-radius:20px;padding:36px 48px;text-align:center;box-shadow:0 0 60px rgba(58,154,74,0.3)">
        <div style="font-size:52px">🎉</div>
        <div style="color:#FFE566;font-size:22px;font-weight:bold;margin:12px 0 6px">Уровень ${lv.id} пройден!</div>
        <button onclick="nextLevel()" style="margin-top:20px;background:#2a7a3a;color:#fff;border:none;border-radius:12px;padding:13px 36px;font-size:16px;cursor:pointer;font-family:Georgia,serif;font-weight:bold">
          ${li+1>=LEVELS.length?'🏆 Финал!':'Следующий →'}
        </button>
      </div>
    </div>`;
  }

  html += `<div style="position:fixed;bottom:6px;left:0;right:0;text-align:center;color:rgba(150,200,130,0.25);font-size:10px;letter-spacing:3px;pointer-events:none">КОТВИЦКАЯ</div>`;
  html += `</div>`;
  app.innerHTML = html;
}

function renderMenu(app) {
  let html = `<div style="min-height:100vh;background:linear-gradient(160deg,#0c1d2e,#0e2b1c,#0c1d2e);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;padding:24px">
    <div style="font-size:52px;margin-bottom:10px">🧩</div>
    <h1 style="color:#FFE566;font-size:28px;margin:0 0 6px;text-shadow:0 0 20px rgba(255,229,102,0.4);text-align:center">Семейный Пазл</h1>
    <p style="color:#4a8a5a;font-size:13px;margin-bottom:32px;text-align:center">20 уровней · 3 режима</p>
    <button onclick="startGame()" style="background:linear-gradient(135deg,#2a7a3a,#3a9a4a);color:#fff;border:none;border-radius:14px;padding:15px 52px;font-size:18px;cursor:pointer;font-family:Georgia,serif;font-weight:bold;box-shadow:0 6px 24px rgba(42,122,58,0.4);margin-bottom:28px">Играть</button>
    <div style="width:100%;max-width:340px">
      <div style="color:#3a6a4a;font-size:10px;text-align:center;margin-bottom:8px;letter-spacing:2px">ВЫБРАТЬ УРОВЕНЬ</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">`;
  LEVELS.forEach((lv,i) => {
    html += `<button onclick="goLevel(${i})" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;color:#aaccaa;padding:8px 0;cursor:pointer;font-family:Georgia,serif;font-size:13px">
      ${lv.id}<div style="font-size:9px;color:#3a6a4a;margin-top:2px">${lv.mode===1?'🌊':lv.mode===2?'🧩':'🧩🧩'}</div>
    </button>`;
  });
  html += `</div></div>
    <div style="position:fixed;bottom:7px;color:rgba(150,200,130,0.25);font-size:10px;letter-spacing:3px">КОТВИЦКАЯ</div>
  </div>`;
  app.innerHTML = html;
}

function renderComplete(app) {
  app.innerHTML = `<div style="min-height:100vh;background:linear-gradient(160deg,#0c1d2e,#0e2b1c,#0c1d2e);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;padding:24px;text-align:center">
    <div style="font-size:64px">🏆</div>
    <h1 style="color:#FFE566;font-size:26px;margin:16px 0 10px">Все уровни пройдены!</h1>
    <p style="color:#4a8a5a;font-size:15px;margin-bottom:32px">Ты настоящий мастер пазлов!</p>
    <button onclick="gotoMenu()" style="background:#2a7a3a;color:#fff;border:none;border-radius:12px;padding:13px 36px;font-size:16px;cursor:pointer;font-family:Georgia,serif;font-weight:bold">В главное меню</button>
    <div style="position:fixed;bottom:7px;color:rgba(150,200,130,0.25);font-size:10px;letter-spacing:3px">КОТВИЦКАЯ</div>
  </div>`;
}

function startGame()  { initLevel(state.li); }
function goLevel(i)   { initLevel(i); }
function gotoMenu()   { setState({screen:'menu'}); }
function nextLevel()  { const n=state.li+1; if(n>=LEVELS.length) setState({screen:'complete'}); else initLevel(n); }

window.tap=tap; window.startGame=startGame; window.goLevel=goLevel; window.gotoMenu=gotoMenu; window.nextLevel=nextLevel;
renderMenu(document.getElementById('app'));

</script>
</body>
</html>
