<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сравнение чисел — Соробан</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3e8;
    --card-bg: #ffffff;
    --border: #c5c0a8;
    --purple: #7b6fa0;
    --purple-light: #b0a8cc;
    --green-dark: #6b8e3e;
    --green-mid: #9ab55a;
    --green-light: #d4e6a0;
    --yellow: #f0e87a;
    --yellow-light: #f7f2c0;
    --gray: #b0b0b0;
    --text: #3a3060;
    --correct: #6b8e3e;
    --wrong: #c0392b;
    --shadow: 0 4px 18px rgba(123,111,160,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Comfortaa', cursive;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 12px 0;
    background-image: 
      radial-gradient(circle at 15% 20%, rgba(180,210,120,0.18) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(176,168,204,0.18) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.5rem;
    color: var(--purple);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    text-align: center;
  }

  .subtitle {
    font-size: 0.82rem;
    color: var(--purple-light);
    margin-bottom: 14px;
    text-align: center;
  }

  /* Score bar */
  .scorebar {
    display: flex;
    gap: 18px;
    margin-bottom: 16px;
    align-items: center;
  }
  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: white;
    border-radius: 14px;
    padding: 6px 18px;
    box-shadow: var(--shadow);
    border: 2px solid var(--border);
  }
  .score-label {
    font-size: 0.65rem;
    color: var(--purple-light);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-value {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.4rem;
    color: var(--purple);
  }
  #score-value { color: var(--green-dark); }
  #streak-value { color: #e07b39; }

  /* Mode switcher */
  .mode-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    background: white;
    border-radius: 20px;
    padding: 5px;
    box-shadow: var(--shadow);
    border: 2px solid var(--border);
  }
  .mode-btn {
    border: none;
    background: transparent;
    border-radius: 15px;
    padding: 6px 14px;
    font-family: 'Comfortaa', cursive;
    font-size: 0.78rem;
    color: var(--purple-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--purple);
    color: white;
    font-weight: 700;
  }

  /* Arena */
  .arena {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 18px;
    min-height: 210px;
  }

  .card-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .flashcard {
    width: 130px;
    height: 175px;
    border-radius: 14px;
    border: 3px solid var(--purple-light);
    box-shadow: var(--shadow);
    object-fit: contain;
    object-position: center;
    background: white;
    padding: 4px;
    transition: transform 0.3s;
  }
  .flashcard:hover { transform: scale(1.03); }

  .number-card {
    width: 130px;
    height: 175px;
    border-radius: 14px;
    border: 3px solid var(--green-mid);
    box-shadow: var(--shadow);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 3.5rem;
    color: var(--purple);
  }

  .card-label {
    font-size: 0.7rem;
    color: var(--purple-light);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Sign buttons */
  .sign-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .sign-btn {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 3px solid var(--border);
    background: white;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--purple);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    line-height: 1;
  }
  .sign-btn:hover {
    background: var(--purple);
    color: white;
    border-color: var(--purple);
    transform: scale(1.1);
  }
  .sign-btn:active { transform: scale(0.95); }
  .sign-btn.correct-answer {
    background: var(--correct);
    color: white;
    border-color: var(--correct);
    animation: pop 0.4s ease;
  }
  .sign-btn.wrong-answer {
    background: var(--wrong);
    color: white;
    border-color: var(--wrong);
    animation: shake 0.35s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Feedback */
  .feedback {
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    margin-bottom: 10px;
    transition: all 0.2s;
  }
  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  /* Stars */
  .stars {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
    font-size: 1.3rem;
  }
  .star { transition: transform 0.2s; }
  .star.lit { transform: scale(1.2); }

  /* Next btn */
  .next-btn {
    background: var(--purple);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 10px 32px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(123,111,160,0.35);
    transition: all 0.2s;
    display: none;
    margin-bottom: 10px;
  }
  .next-btn:hover { background: #5a4f80; transform: translateY(-2px); }
  .next-btn.visible { display: block; }

  /* Footer */
  footer {
    margin-top: auto;
    padding: 16px 0 8px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--purple-light);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Results overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(58,48,96,0.7);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .overlay.show { display: flex; }
  .result-box {
    background: white;
    border-radius: 24px;
    padding: 36px 40px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    max-width: 320px;
  }
  .result-box h2 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.8rem;
    color: var(--purple);
    margin-bottom: 8px;
  }
  .result-score {
    font-family: 'Nunito', sans-serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--green-dark);
    margin: 10px 0;
  }
  .result-sub {
    color: var(--purple-light);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .restart-btn {
    background: var(--purple);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 12px 36px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .restart-btn:hover { background: #5a4f80; }

  /* Progress */
  .progress-bar-wrap {
    width: 280px;
    height: 6px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-mid), var(--purple-light));
    border-radius: 4px;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>

<h1>🧮 Сравни числа!</h1>
<p class="subtitle">Выбери правильный знак сравнения</p>

<div class="scorebar">
  <div class="score-item">
    <span class="score-label">Очки</span>
    <span class="score-value" id="score-value">0</span>
  </div>
  <div class="score-item">
    <span class="score-label">Вопрос</span>
    <span class="score-value" id="question-value">1/10</span>
  </div>
  <div class="score-item">
    <span class="score-label">Серия</span>
    <span class="score-value" id="streak-value">0</span>
  </div>
</div>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('card-card')">🃏 Карта–Карта</button>
  <button class="mode-btn" onclick="setMode('card-num')">🃏 Карта–Число</button>
  <button class="mode-btn" onclick="setMode('mixed')">🎲 Микс</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
</div>

<div class="arena">
  <div class="card-wrap">
    <div id="left-card"></div>
    <span class="card-label" id="left-label">Соробан</span>
  </div>

  <div class="sign-area">
    <button class="sign-btn" id="btn-less" onclick="answer('<')">&#60;</button>
    <button class="sign-btn" id="btn-eq" onclick="answer('=')">=</button>
    <button class="sign-btn" id="btn-more" onclick="answer('>')">&#62;</button>
  </div>

  <div class="card-wrap">
    <div id="right-card"></div>
    <span class="card-label" id="right-label">Соробан</span>
  </div>
</div>

<div class="feedback" id="feedback"></div>

<button class="next-btn" id="next-btn" onclick="nextQuestion()">Следующий →</button>

<div class="overlay" id="overlay">
  <div class="result-box">
    <h2>🎉 Молодец!</h2>
    <div class="result-score" id="final-score">0</div>
    <div class="result-sub" id="final-sub">из 10 правильно</div>
    <button class="restart-btn" onclick="restartGame()">Играть снова!</button>
  </div>
</div>

<footer>Котвицкая</footer>

const TOTAL_QUESTIONS = 10;
let mode = 'card-card';
let score = 0;
let streak = 0;
let currentQ = 0;
let answered = false;
let leftVal, rightVal, correctSign;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  restartGame();
}

function getRandomNum() {
  return Math.floor(Math.random() * 20) + 1;
}

function renderCard(container, val, isImage) {
  if (isImage) {
    const img = document.createElement('img');
    img.className = 'flashcard';
    img.src = CARD_IMAGES[val - 1];
    img.alt = 'соробан';
    container.innerHTML = '';
    container.appendChild(img);
  } else {
    container.innerHTML = `<div class="number-card">${val}</div>`;
  }
}

function nextQuestion() {
  if (currentQ >= TOTAL_QUESTIONS) { showResults(); return; }

  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').classList.remove('visible');
  ['btn-less','btn-eq','btn-more'].forEach(id => {
    const b = document.getElementById(id);
    b.classList.remove('correct-answer','wrong-answer');
    b.disabled = false;
  });

  leftVal = getRandomNum();
  do { rightVal = getRandomNum(); } while (rightVal === leftVal && Math.random() > 0.15);

  correctSign = leftVal < rightVal ? '<' : leftVal > rightVal ? '>' : '=';

  let leftIsImg, rightIsImg;
  if (mode === 'card-card') { leftIsImg = true; rightIsImg = true; }
  else if (mode === 'card-num') {
    leftIsImg = Math.random() > 0.5;
    rightIsImg = !leftIsImg;
  } else {
    // ~45% card+card, ~55% card+number, 0% number+number
    if (Math.random() < 0.45) { leftIsImg = true; rightIsImg = true; }
    else { leftIsImg = Math.random() > 0.5; rightIsImg = !leftIsImg; }
  }

  renderCard(document.getElementById('left-card'), leftVal, leftIsImg);
  renderCard(document.getElementById('right-card'), rightVal, rightIsImg);
  document.getElementById('left-label').textContent = leftIsImg ? 'Соробан' : 'Число';
  document.getElementById('right-label').textContent = rightIsImg ? 'Соробан' : 'Число';

  currentQ++;
  document.getElementById('question-value').textContent = `${currentQ}/${TOTAL_QUESTIONS}`;
  document.getElementById('progress-fill').style.width = `${((currentQ-1)/TOTAL_QUESTIONS)*100}%`;
}

function answer(sign) {
  if (answered) return;
  answered = true;

  const correct = sign === correctSign;
  const signMap = { '<': 'btn-less', '=': 'btn-eq', '>': 'btn-more' };
  const correctBtnId = signMap[correctSign];

  if (correct) {
    score++;
    streak++;
    document.getElementById(signMap[sign]).classList.add('correct-answer');
    document.getElementById('feedback').textContent = streak >= 3 ? `✨ Верно! Серия: ${streak}!` : '✓ Верно!';
    document.getElementById('feedback').className = 'feedback correct';
  } else {
    streak = 0;
    document.getElementById(signMap[sign]).classList.add('wrong-answer');
    document.getElementById(correctBtnId).classList.add('correct-answer');
    document.getElementById('feedback').textContent = `✗ Неверно! ${leftVal} ${correctSign} ${rightVal}`;
    document.getElementById('feedback').className = 'feedback wrong';
  }

  ['btn-less','btn-eq','btn-more'].forEach(id => {
    document.getElementById(id).disabled = true;
  });

  document.getElementById('score-value').textContent = score;
  document.getElementById('streak-value').textContent = streak + (streak >= 3 ? '🔥' : '');

  if (currentQ >= TOTAL_QUESTIONS) {
    setTimeout(showResults, 1200);
  } else {
    document.getElementById('next-btn').classList.add('visible');
  }
}

function showResults() {
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-sub').textContent = `из ${TOTAL_QUESTIONS} правильно`;
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('overlay').classList.add('show');
}

function restartGame() {
  score = 0; streak = 0; currentQ = 0; answered = false;
  document.getElementById('score-value').textContent = '0';
  document.getElementById('streak-value').textContent = '0';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('progress-fill').style.width = '0%';
  nextQuestion();
}

// Start!
nextQuestion();
</script>

</body>
